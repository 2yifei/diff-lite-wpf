# ===================================
# Diff-Lite WPF — GitHub Actions 自动构建
# 推送到 main 分支时自动编译并发布 Release
# ===================================

name: 构建与发布

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建 Windows 单文件程序
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: 还原依赖
        run: dotnet restore

      - name: 构建
        run: dotnet build -c Release --no-restore

      - name: 发布（框架依赖，不含运行时）
        run: |
          dotnet publish -c Release -o publish

      - name: 打包为 ZIP
        run: |
          Compress-Archive -Path publish\* -DestinationPath DiffLite-WPF-v2.0.${{ github.run_number }}.zip

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Diff-Lite-WPF
          path: publish/
          retention-days: 30

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "Diff-Lite WPF v2.0.${{ github.run_number }}"
          body: |
            ## Diff-Lite WPF v2.0.${{ github.run_number }}

            ### 📦 使用说明
            1. 下载 `DiffLite-WPF-v2.0.X.zip`
            2. 解压到任意文件夹
            3. 双击 `DiffLite.exe` 即可运行
            > 需要 [.NET 8.0 桌面运行时](https://dotnet.microsoft.com/download/dotnet/8.0)（Win10/11 通常已自带）

            ### 📏 体积
            解压后约 1MB，exe 仅 150KB
          files: |
            DiffLite-WPF-v2.0.${{ github.run_number }}.zip
          draft: false
          prerelease: false
